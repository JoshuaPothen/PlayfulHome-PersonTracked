hue:
  room: Living room
detection:
  model: yolov8s-pose.pt
  confidence: 0.4
  camera_index: 0
gestures:
  squat_hip_knee_ratio: 0.85
  hands_raised_min_wrists: 1
  huddle_left_threshold: 0.4
  huddle_right_threshold: 0.6
  huddle_min_people: 2
  still_movement_thresh: 0.015
  still_duration: 4.0
states:
  squat_trigger_ratio: 0.5
  hands_up_ratio: 0.5
  min_people: 1
  idle:
    colour:
    - 30
    - 20
    - 70
    min_hold: 3.0
  stillness:
    colour:
    - 30
    - 30
    - 20
    min_hold: 8.0
  huddle_left:
    colour:
    - 210
    - 80
    - 80
    min_hold: 4.0
  huddle_right:
    colour:
    - 30
    - 90
    - 80
    min_hold: 4.0
  squat_active:
    colour:
    - 280
    - 100
    - 90
    min_hold: 5.0
  hands_up:
    colour:
    - 0
    - 0
    - 100
    min_hold: 4.0
app:
  headless: false
  log_level: INFO
  events_csv: events.csv
lamp_mode:
  idle_brightness: 20        # brightness % for lamps with no one nearby (same hue as count)
  empty_colour: [30, 20, 15] # HSB shown on all lamps when no one is in the frame at all
  # Colour steps by person count. Last entry covers all higher counts.
  person_colours:
    1: [120, 100, 90]   # green
    2: [210, 100, 90]   # blue
    3: [280, 100, 90]   # purple
    4: [30,  100, 90]   # orange (4+)
lamp_zones:
- label: Left
  hue_light: Lamp 1
  frame_x: 0.69
  frame_y: 0.781
  radius: 0.18
  colour_active: &id001
  - 120
  - 100
  - 90
  colour_idle: &id002
  - 30
  - 20
  - 40
- label: Right
  hue_light: Lamp 2
  frame_x: 0.341
  frame_y: 0.779
  radius: 0.18
  colour_active: *id001
  colour_idle: *id002
- label: Top R
  hue_light: Light 1
  frame_x: 0.68
  frame_y: 0.255
  radius: 0.18
  colour_active: *id001
  colour_idle: *id002
- label: Top L
  hue_light: Light 2
  frame_x: 0.361
  frame_y: 0.255
  radius: 0.18
  colour_active: *id001
  colour_idle: *id002
